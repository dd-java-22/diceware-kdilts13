<!DOCTYPE html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
>

  <head>
    <meta charset="UTF-8">
    <title>Random Passphrase</title>
    <style>
      :root {
        --primary-color: #6200ee;
        --secondary-color: #03dac6;
        --background-color: #f5f5f5;
        --surface-color: #ffffff;
        --on-surface: #000000;
        --on-primary: #ffffff;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        color: var(--on-surface);
      }

      .container {
        background-color: var(--surface-color);
        padding: 2.5rem;
        border-radius: 1rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
        width: 100%;
        max-width: 400px;
      }

      h1 {
        margin-bottom: 1.5rem;
        color: var(--primary-color);
        font-weight: 300;
      }

      #passphrase-list {
        list-style: none;
        padding: 0;
        margin: 1.5rem 0;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.5rem;
        min-height: 3rem;
      }

      #passphrase-list li {
        background-color: var(--background-color);
        padding: 0.5rem 0.75rem;
        border-radius: 0.5rem;
        font-family: monospace;
        font-size: 1.1rem;
        border: 1px solid #ddd;
      }

      .controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
      }

      .length-picker {
        display: flex;
        align-items: center;
        gap: 1rem;
        background: var(--background-color);
        padding: 0.5rem 1rem;
        border-radius: 2rem;
      }

      #length-display {
        font-weight: bold;
        font-size: 1.2rem;
        min-width: 2rem;
      }

      button {
        cursor: pointer;
        border: none;
        transition: all 0.2s;
        outline: none;
      }

      button:active {
        transform: scale(0.95);
      }

      .icon-button {
        background-color: var(--primary-color);
        color: var(--on-primary);
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 50%;
        font-size: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon-button:hover {
        background-color: #3700b3;
      }

      #generate-button {
        background-color: var(--secondary-color);
        color: var(--on-surface);
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.05rem;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      #generate-button:hover {
        background-color: #018786;
        color: var(--on-primary);
        box-shadow: 0 6px 8px rgba(0, 0, 0, 0.2);
      }

    </style>
  </head>

  <body>
    <div class="container">
      <h1>Diceware</h1>

      <ul id="passphrase-list">
        <li
          th:each="word : ${words}"
          th:text="${word}"
        >
          No passphrase generated
        </li>
      </ul>

      <div class="controls">
        <div class="length-picker">
          <button id="minus-button" class="icon-button">-</button>
          <span id="length-display" th:text="${length}">5</span>
          <button id="plus-button" class="icon-button">+</button>
        </div>

        <button id="generate-button">Generate New Passphrase</button>
      </div>
    </div>

    <script>
      const list = document.getElementById('passphrase-list');
      const generateButton = document.getElementById('generate-button');
      const minusButton = document.getElementById('minus-button');
      const plusButton = document.getElementById('plus-button');
      const lengthDisplay = document.getElementById('length-display');

      let currentLength = parseInt(lengthDisplay.textContent);

      minusButton.addEventListener('click', () => {
        if (currentLength > 1) {
          currentLength--;
          lengthDisplay.textContent = currentLength;
        }
      });

      plusButton.addEventListener('click', () => {
        if (currentLength < 20) {
          currentLength++;
          lengthDisplay.textContent = currentLength;
        }
      });

      generateButton.addEventListener('click', () => {
        fetch(`/passphrases/generate?length=${currentLength}`, {
          method: 'POST'
        })
        .then(response => response.json())
        .then(words => {
          list.innerHTML = '';
          words.forEach(word => {
            const li = document.createElement('li');
            li.textContent = word;
            list.appendChild(li);
          });
        });
      });
    </script>
  </body>

</html>
