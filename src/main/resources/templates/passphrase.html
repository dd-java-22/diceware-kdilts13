<!DOCTYPE html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
>

  <head>
    <meta charset="UTF-8">
    <title>Random Passphrase</title>
  </head>

  <body>
    <ul id="passphrase-list">
      <li
        th:each="word : ${words}"
        th:text="${word}"
      >
        No passphrase generated
      </li>
    </ul>

    <button id="generate-button">Generate New Passphrase</button>

    <div>
      <button id="minus-button">-</button>
      <span id="length-display" th:text="${length}">5</span>
      <button id="plus-button">+</button>
    </div>

    <script>
      const list = document.getElementById('passphrase-list');
      const generateButton = document.getElementById('generate-button');
      const minusButton = document.getElementById('minus-button');
      const plusButton = document.getElementById('plus-button');
      const lengthDisplay = document.getElementById('length-display');

      let currentLength = parseInt(lengthDisplay.textContent);

      minusButton.addEventListener('click', () => {
        if (currentLength > 1) {
          currentLength--;
          lengthDisplay.textContent = currentLength;
        }
      });

      plusButton.addEventListener('click', () => {
        if (currentLength < 20) {
          currentLength++;
          lengthDisplay.textContent = currentLength;
        }
      });

      generateButton.addEventListener('click', () => {
        fetch(`/passphrases/generate?length=${currentLength}`, {
          method: 'POST'
        })
        .then(response => response.json())
        .then(words => {
          list.innerHTML = '';
          words.forEach(word => {
            const li = document.createElement('li');
            li.textContent = word;
            list.appendChild(li);
          });
        });
      });
    </script>
  </body>

</html>
