<!DOCTYPE html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
>

  <head>
    <meta charset="UTF-8">
    <title>Random Passphrase</title>
    <style>
      :root {
        --primary-color: #6200ee;
        --secondary-color: #03dac6;
        --background-color: #f5f5f5;
        --surface-color: #ffffff;
        --on-surface: #000000;
        --on-primary: #ffffff;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        color: var(--on-surface);
      }

      .container {
        background-color: var(--surface-color);
        padding: 2.5rem;
        border-radius: 1rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
        width: 100%;
        max-width: 400px;
      }

      h1 {
        margin-bottom: 1.5rem;
        color: var(--primary-color);
        font-weight: 300;
      }

      #passphrase-list {
        list-style: none;
        padding: 0;
        margin: 1.5rem 0;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.5rem;
        min-height: 3rem;
      }

      #passphrase-list li {
        padding: 0;
        border-radius: 0.5rem;
        overflow: hidden;
      }

      .word-button {
        background-color: var(--background-color);
        padding: 0.5rem 0.75rem;
        border-radius: 0.5rem;
        font-family: monospace;
        font-size: 1.1rem;
        border: 1px solid #ddd;
        display: block;
        width: 100%;
        text-align: center;
      }

      .word-button:hover {
        background-color: #eee;
        border-color: #bbb;
      }

      .word-button:active {
        transform: scale(0.95);
        background-color: #ddd;
      }

      .controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
      }

      .length-picker {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        background: var(--background-color);
        padding: 1rem 1.5rem;
        border-radius: 1rem;
        width: 100%;
        box-sizing: border-box;
      }

      .length-info {
        display: flex;
        justify-content: space-between;
        width: 100%;
        font-weight: bold;
        color: var(--primary-color);
      }

      #length-slider {
        width: 100%;
        cursor: pointer;
        accent-color: var(--primary-color);
      }

      button {
        cursor: pointer;
        border: none;
        transition: all 0.2s;
        outline: none;
      }

      button:active {
        transform: scale(0.95);
      }

      .icon-button {
        background-color: var(--primary-color);
        color: var(--on-primary);
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 50%;
        font-size: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon-button:hover {
        background-color: #3700b3;
      }

      #generate-button {
        background-color: var(--secondary-color);
        color: var(--on-surface);
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.05rem;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        flex: 1;
      }

      #shuffle-button {
        background-color: var(--primary-color);
        color: var(--on-primary);
        padding: 0.75rem;
        border-radius: 0.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      #shuffle-button img {
        width: 1.5rem;
        height: 1.5rem;
        filter: invert(1);
      }

      #generate-button:hover {
        background-color: #018786;
        color: var(--on-primary);
        box-shadow: 0 6px 8px rgba(0, 0, 0, 0.2);
      }

      #shuffle-button:hover {
        background-color: #3700b3;
        box-shadow: 0 6px 8px rgba(0, 0, 0, 0.2);
      }

      .button-group {
        display: flex;
        gap: 0.5rem;
        width: 100%;
      }

    </style>
  </head>

  <body>
    <div class="container">
      <h1>Diceware</h1>

      <ul id="passphrase-list">
        <li th:each="word : ${words}">
          <button
            class="word-button"
            th:text="${word}"
          >
            No passphrase generated
          </button>
        </li>
      </ul>

      <div class="controls">
        <div class="length-picker">
          <div class="length-info">
            <span>Length:</span>
            <span id="length-display" th:text="${length}">5</span>
          </div>
          <input
            type="range"
            id="length-slider"
            min="0"
            max="20"
            th:value="${length}"
          >
        </div>

        <div class="button-group">
          <button id="generate-button">Generate New Passphrase</button>
          <button id="shuffle-button" title="Shuffle words">
            <img th:src="@{/images/cached.svg}" alt="Shuffle">
          </button>
        </div>
      </div>
    </div>

    <script>
      const list = document.getElementById('passphrase-list');
      const generateButton = document.getElementById('generate-button');
      const shuffleButton = document.getElementById('shuffle-button');
      const lengthSlider = document.getElementById('length-slider');
      const lengthDisplay = document.getElementById('length-display');

      let currentLength = parseInt(lengthSlider.value);

      const updateList = (words) => {
        list.innerHTML = '';
        words.forEach(word => {
          const li = document.createElement('li');
          const button = document.createElement('button');
          button.classList.add('word-button');
          button.textContent = word;
          li.appendChild(button);
          list.appendChild(li);
        });
      };

      lengthSlider.addEventListener('input', (event) => {
        currentLength = event.target.value;
        lengthDisplay.textContent = currentLength;
      });

      generateButton.addEventListener('click', () => {
        fetch(`/passphrases/generate?length=${currentLength}`, {
          method: 'POST'
        })
        .then(response => response.json())
        .then(words => updateList(words));
      });

      shuffleButton.addEventListener('click', () => {
        const words = Array.from(list.querySelectorAll('.word-button'))
          .map(button => button.textContent.trim());
        
        if (words.length === 0) return;

        fetch('/passphrases/shuffle', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(words)
        })
        .then(response => response.json())
        .then(shuffledWords => updateList(shuffledWords));
      });

      list.addEventListener('click', (event) => {
        const button = event.target.closest('.word-button');
        if (button) {
          fetch('/passphrases/generate?length=1', {
            method: 'POST'
          })
          .then(response => response.json())
          .then(words => {
            if (words && words.length > 0) {
              button.textContent = words[0];
            }
          });
        }
      });
    </script>
  </body>

</html>
